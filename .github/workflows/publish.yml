on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/v1-monitor

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('readr','dplyr','tibble','purrr','stringr','tidyr','lubridate','jsonlite','knitr','rmarkdown'), repos='https://cloud.r-project.org')"

      - name: Run pipeline and render site
        run: |
          Rscript scripts/run_daily_update.R

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
