on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/v1-monitor

name: Quarto Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('readr','dplyr','tibble','purrr','stringr','tidyr','lubridate','jsonlite','knitr','rmarkdown'), repos='https://cloud.r-project.org')"

      - name: Run pipeline and render site
        run: |
          Rscript scripts/run_daily_update.R

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
