project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "candidatos/*.qmd"

website:
  title: "Monitor Colombia 2026"
  navbar:
    background: light
    left:
      - href: index.qmd
        text: Inicio
      - href: candidatos/index.qmd
        text: Candidatos
      - href: comparador.qmd
        text: Comparador
      - href: cronologia.qmd
        text: Cronología
      - href: fuentes.qmd
        text: Fuentes
      - href: fuentes-evaluadas.qmd
        text: Fuentes evaluadas
      - href: metodologia.qmd
        text: Metodología
  page-footer:
    left: "Monitor Colombia 2026"
    right: "Análisis generado por IA con trazabilidad a fuentes."

execute:
  echo: false
  warning: false
  message: false
  freeze: false

format:
  html:
    theme: flatly
    css: styles.css
    toc: true
    include-before-body: _includes/disclaimer.html
    df-print: paged
